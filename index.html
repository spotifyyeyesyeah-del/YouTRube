<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YTProxy</title>
<style>
  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --surface2: #242424;
    --accent: #ff0000;
    --accent2: #ff4444;
    --text: #e8e8e8;
    --muted: #888;
    --border: #333;
    --radius: 12px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', system-ui, sans-serif;
    min-height: 100vh;
  }
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 14px 24px;
    display: flex;
    align-items: center;
    gap: 20px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .logo {
    font-size: 1.4rem;
    font-weight: 700;
    color: var(--accent);
    white-space: nowrap;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .logo svg { width: 28px; height: 28px; }
  .search-bar {
    flex: 1;
    display: flex;
    gap: 8px;
    max-width: 700px;
  }
  .search-bar input {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 16px;
    border-radius: 24px;
    font-size: 0.95rem;
    outline: none;
    transition: border-color 0.2s;
  }
  .search-bar input:focus { border-color: var(--accent); }
  .btn {
    background: var(--accent);
    color: white;
    border: none;
    padding: 10px 20px;
    border-radius: 24px;
    cursor: pointer;
    font-size: 0.9rem;
    font-weight: 600;
    transition: background 0.2s, transform 0.1s;
    white-space: nowrap;
  }
  .btn:hover { background: var(--accent2); }
  .btn:active { transform: scale(0.97); }
  .btn-ghost {
    background: var(--surface2);
    color: var(--text);
    border: 1px solid var(--border);
  }
  .btn-ghost:hover { background: var(--border); }

  main { padding: 24px; max-width: 1400px; margin: 0 auto; }

  /* Player section */
  #player-section { display: none; margin-bottom: 32px; }
  .player-wrap {
    background: var(--surface);
    border-radius: var(--radius);
    overflow: hidden;
    border: 1px solid var(--border);
  }
  video {
    width: 100%;
    max-height: 540px;
    background: #000;
    display: block;
  }
  .player-info {
    padding: 16px 20px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .player-title {
    font-size: 1.15rem;
    font-weight: 600;
    line-height: 1.4;
  }
  .player-meta {
    color: var(--muted);
    font-size: 0.88rem;
    display: flex;
    gap: 16px;
    align-items: center;
    flex-wrap: wrap;
  }
  .player-actions {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    align-items: center;
    margin-top: 4px;
  }
  .quality-select {
    background: var(--surface2);
    color: var(--text);
    border: 1px solid var(--border);
    padding: 8px 14px;
    border-radius: 20px;
    font-size: 0.88rem;
    cursor: pointer;
    outline: none;
  }

  /* URL input panel */
  .url-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px;
    margin-bottom: 28px;
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    align-items: flex-end;
  }
  .url-panel .field { flex: 1; min-width: 260px; }
  .url-panel label {
    display: block;
    color: var(--muted);
    font-size: 0.83rem;
    margin-bottom: 6px;
    font-weight: 500;
  }
  .url-panel input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 11px 16px;
    border-radius: 8px;
    font-size: 0.95rem;
    outline: none;
    transition: border-color 0.2s;
  }
  .url-panel input:focus { border-color: var(--accent); }

  /* Search results */
  #results-section { display: none; }
  .section-title {
    font-size: 1rem;
    font-weight: 600;
    color: var(--muted);
    margin-bottom: 16px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    font-size: 0.8rem;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 16px;
  }
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    cursor: pointer;
    transition: border-color 0.2s, transform 0.15s;
  }
  .card:hover {
    border-color: var(--accent);
    transform: translateY(-2px);
  }
  .card-thumb {
    width: 100%;
    aspect-ratio: 16/9;
    object-fit: cover;
    background: var(--surface2);
    display: block;
  }
  .card-body { padding: 12px 14px 14px; }
  .card-title {
    font-size: 0.92rem;
    font-weight: 600;
    line-height: 1.4;
    margin-bottom: 6px;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .card-meta {
    color: var(--muted);
    font-size: 0.8rem;
    display: flex;
    gap: 10px;
  }
  .duration-badge {
    background: rgba(0,0,0,0.8);
    color: white;
    font-size: 0.72rem;
    font-weight: 600;
    padding: 2px 6px;
    border-radius: 4px;
    position: absolute;
    bottom: 6px;
    right: 6px;
  }
  .thumb-wrap { position: relative; }

  /* Loader */
  .loader {
    display: none;
    align-items: center;
    justify-content: center;
    gap: 10px;
    padding: 40px;
    color: var(--muted);
    font-size: 0.95rem;
  }
  .loader.show { display: flex; }
  .spinner {
    width: 22px; height: 22px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .error-msg {
    background: #2a1010;
    border: 1px solid #5a2020;
    color: #ff8888;
    border-radius: 8px;
    padding: 12px 16px;
    font-size: 0.9rem;
    display: none;
  }
  .error-msg.show { display: block; }

  @media (max-width: 600px) {
    header { flex-wrap: wrap; }
    .search-bar { order: 2; width: 100%; max-width: 100%; }
    main { padding: 16px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <svg viewBox="0 0 24 24" fill="currentColor">
      <path d="M23.5 6.2a3 3 0 0 0-2.1-2.1C19.5 3.5 12 3.5 12 3.5s-7.5 0-9.4.6A3 3 0 0 0 .5 6.2C0 8.1 0 12 0 12s0 3.9.5 5.8a3 3 0 0 0 2.1 2.1c1.9.6 9.4.6 9.4.6s7.5 0 9.4-.6a3 3 0 0 0 2.1-2.1C24 15.9 24 12 24 12s0-3.9-.5-5.8zM9.7 15.5V8.5l6.3 3.5-6.3 3.5z"/>
    </svg>
    YTProxy
  </div>
  <div class="search-bar">
    <input type="text" id="search-input" placeholder="Поиск видео..." />
    <button class="btn" onclick="doSearch()">Найти</button>
  </div>
</header>

<main>
  <!-- URL Panel -->
  <div class="url-panel">
    <div class="field">
      <label>Вставить ссылку на YouTube</label>
      <input type="text" id="url-input" placeholder="https://www.youtube.com/watch?v=..." />
    </div>
    <button class="btn" onclick="loadFromUrl()">▶ Смотреть</button>
  </div>

  <div class="error-msg" id="error-msg"></div>
  <div class="loader" id="loader"><div class="spinner"></div> Загружаем...</div>

  <!-- Player -->
  <div id="player-section">
    <div class="player-wrap">
      <video id="video-player" controls preload="metadata"></video>
      <div class="player-info">
        <div class="player-title" id="player-title"></div>
        <div class="player-meta">
          <span id="player-uploader"></span>
          <span id="player-duration"></span>
        </div>
        <div class="player-actions">
          <select class="quality-select" id="quality-select" onchange="changeQuality()"></select>
          <button class="btn btn-ghost" onclick="downloadVideo()">⬇ Скачать</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Search Results -->
  <div id="results-section">
    <div class="section-title">Результаты поиска</div>
    <div class="grid" id="results-grid"></div>
  </div>
</main>

<script>
  let currentUrl = '';
  let currentFormats = [];

  function fmtDuration(s) {
    if (!s) return '';
    const h = Math.floor(s/3600), m = Math.floor((s%3600)/60), sec = s%60;
    if (h > 0) return `${h}:${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
    return `${m}:${String(sec).padStart(2,'0')}`;
  }

  function showError(msg) {
    const el = document.getElementById('error-msg');
    el.textContent = '⚠ ' + msg;
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 6000);
  }

  function setLoading(v) {
    document.getElementById('loader').classList.toggle('show', v);
  }

  async function loadVideoInfo(url) {
    currentUrl = url;
    setLoading(true);
    document.getElementById('player-section').style.display = 'none';
    try {
      const res = await fetch('/api/info?url=' + encodeURIComponent(url));
      const data = await res.json();
      if (data.error) { showError(data.error); return; }

      currentFormats = data.formats;
      document.getElementById('player-title').textContent = data.title || '';
      document.getElementById('player-uploader').textContent = '👤 ' + (data.uploader || '');
      document.getElementById('player-duration').textContent = '⏱ ' + fmtDuration(data.duration);

      const sel = document.getElementById('quality-select');
      sel.innerHTML = '';
      if (data.formats && data.formats.length) {
        data.formats.reverse().forEach(f => {
          const o = document.createElement('option');
          o.value = f.format_id;
          o.textContent = f.label;
          sel.appendChild(o);
        });
      } else {
        const o = document.createElement('option');
        o.value = 'best[ext=mp4]/best';
        o.textContent = 'Лучшее';
        sel.appendChild(o);
      }

      playVideo();
      document.getElementById('player-section').style.display = 'block';
      document.getElementById('player-section').scrollIntoView({ behavior: 'smooth', block: 'start' });
    } catch(e) {
      showError('Ошибка: ' + e.message);
    } finally {
      setLoading(false);
    }
  }

  function playVideo() {
    const sel = document.getElementById('quality-select');
    const fmt = sel.value || 'best[ext=mp4]/best';
    const player = document.getElementById('video-player');
    const src = `/stream?url=${encodeURIComponent(currentUrl)}&format=${encodeURIComponent(fmt)}`;
    player.src = src;
    player.play().catch(()=>{});
  }

  function changeQuality() {
    const player = document.getElementById('video-player');
    const t = player.currentTime;
    playVideo();
    player.addEventListener('canplay', () => { player.currentTime = t; }, { once: true });
  }

  function downloadVideo() {
    const sel = document.getElementById('quality-select');
    const fmt = sel.value || 'best[ext=mp4]/best';
    window.location = `/download?url=${encodeURIComponent(currentUrl)}&format=${encodeURIComponent(fmt)}`;
  }

  function loadFromUrl() {
    const url = document.getElementById('url-input').value.trim();
    if (!url) { showError('Введите ссылку на видео'); return; }
    document.getElementById('results-section').style.display = 'none';
    loadVideoInfo(url);
  }

  async function doSearch() {
    const q = document.getElementById('search-input').value.trim();
    if (!q) return;
    setLoading(true);
    document.getElementById('results-section').style.display = 'none';
    try {
      const res = await fetch('/api/search?q=' + encodeURIComponent(q));
      const data = await res.json();
      if (data.error) { showError(data.error); return; }

      const grid = document.getElementById('results-grid');
      grid.innerHTML = '';
      data.forEach(v => {
        const card = document.createElement('div');
        card.className = 'card';
        card.onclick = () => {
          loadVideoInfo(`https://www.youtube.com/watch?v=${v.id}`);
        };
        card.innerHTML = `
          <div class="thumb-wrap">
            <img class="card-thumb" src="${v.thumbnail}" alt="" loading="lazy" onerror="this.src=''">
            ${v.duration ? `<span class="duration-badge">${fmtDuration(v.duration)}</span>` : ''}
          </div>
          <div class="card-body">
            <div class="card-title">${v.title || ''}</div>
            <div class="card-meta">
              <span>${v.uploader || ''}</span>
            </div>
          </div>`;
        grid.appendChild(card);
      });
      document.getElementById('results-section').style.display = 'block';
    } catch(e) {
      showError('Ошибка поиска: ' + e.message);
    } finally {
      setLoading(false);
    }
  }

  // Enter key support
  document.getElementById('search-input').addEventListener('keydown', e => e.key === 'Enter' && doSearch());
  document.getElementById('url-input').addEventListener('keydown', e => e.key === 'Enter' && loadFromUrl());
</script>
</body>
</html>
